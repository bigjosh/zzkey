name: Build APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Needed so the workflow can publish the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        env:
          # Drives versionCode/versionName so each published build is a distinct version.
          ZZKEYS_VERSION_CODE: ${{ github.run_number }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zzkeys-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # On main, also publish the APK as a release asset. Unlike Actions artifacts
      # (which always download as a .zip), a release asset downloads as the raw .apk,
      # so the link below is directly tappable/installable on the phone.
      #
      # Each build gets a UNIQUE, increasing tag (v1.0.<build#>) so update-trackers like
      # Obtainium — which read the version from the release tag — detect new builds. With
      # make_latest: true, this stays the "latest" release, so the permanent URL still works:
      #   https://github.com/bigjosh/zzkey/releases/latest/download/app-debug.apk
      - name: Publish APK to a versioned release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: zzkeys v1.0.${{ github.run_number }}
          make_latest: true
          body: |
            Auto-built debug APK. On your phone, tap **app-debug.apk** below to install.

            Permanent direct link (always the newest build):
            https://github.com/bigjosh/zzkey/releases/latest/download/app-debug.apk
          files: app/build/outputs/apk/debug/app-debug.apk
