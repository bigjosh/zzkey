plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// versionCode comes from the CI build number (github.run_number, passed in as an env var)
// so every published build is a distinct, increasing version that updaters like Obtainium
// recognize as an update. Local builds with no env var fall back to 1.
def ciVersionCode = (System.getenv("ZZKEYS_VERSION_CODE") ?: "1").toInteger()

android {
    namespace 'com.example.zzkeys'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.zzkeys"
        minSdk 30
        targetSdk 35
        versionCode ciVersionCode
        versionName "1.0.${ciVersionCode}"
    }

    buildTypes {
        debug {
            // debug build is signed with the auto-generated debug key,
            // which is enough to sideload on your own device.
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
